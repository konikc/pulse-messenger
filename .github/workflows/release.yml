name: Release native apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (for example v0.1.0)
        required: true
        default: v0.1.0

permissions:
  contents: write

env:
  PULSE_APP_URL: https://pulse-messenger-chi.vercel.app
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || env.RELEASE_TAG }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: pnpm install --frozen-lockfile
      - name: Prepare Android signing key
        id: signing
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.PULSE_ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.PULSE_ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.PULSE_ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.PULSE_ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$KEYSTORE_PASSWORD" && -n "$KEY_ALIAS" && -n "$KEY_PASSWORD" ]]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/pulse-release.p12"
            echo "password=$KEYSTORE_PASSWORD" >> "$GITHUB_OUTPUT"
            echo "alias=$KEY_ALIAS" >> "$GITHUB_OUTPUT"
            echo "key_password=$KEY_PASSWORD" >> "$GITHUB_OUTPUT"
            echo "generated=false" >> "$GITHUB_OUTPUT"
          else
            GENERATED_PASSWORD="$(openssl rand -hex 24)"
            keytool -genkeypair -v -storetype PKCS12 \
              -keystore "$RUNNER_TEMP/pulse-release.p12" \
              -alias pulse -keyalg RSA -keysize 4096 -validity 10000 \
              -storepass "$GENERATED_PASSWORD" -keypass "$GENERATED_PASSWORD" \
              -dname "CN=Pulse Messenger, O=Pulse, C=US"
            echo "password=$GENERATED_PASSWORD" >> "$GITHUB_OUTPUT"
            echo "alias=pulse" >> "$GITHUB_OUTPUT"
            echo "key_password=$GENERATED_PASSWORD" >> "$GITHUB_OUTPUT"
            echo "generated=true" >> "$GITHUB_OUTPUT"
            mkdir -p "$RUNNER_TEMP/signing-backup"
            cp "$RUNNER_TEMP/pulse-release.p12" "$RUNNER_TEMP/signing-backup/pulse-release.p12"
            printf 'alias=pulse\nstore_password=%s\nkey_password=%s\n' "$GENERATED_PASSWORD" "$GENERATED_PASSWORD" > "$RUNNER_TEMP/signing-backup/credentials.txt"
          fi
      - name: Save generated signing backup
        if: steps.signing.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pulse-android-signing-backup
          path: ${{ runner.temp }}/signing-backup
          retention-days: 90
      - name: Sync Capacitor project
        run: pnpm android:sync
      - name: Build signed APK
        working-directory: android
        env:
          PULSE_ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/pulse-release.p12
          PULSE_ANDROID_KEYSTORE_PASSWORD: ${{ steps.signing.outputs.password }}
          PULSE_ANDROID_KEY_ALIAS: ${{ steps.signing.outputs.alias }}
          PULSE_ANDROID_KEY_PASSWORD: ${{ steps.signing.outputs.key_password }}
        run: ./gradlew assembleRelease --no-daemon
      - name: Prepare APK
        run: cp android/app/build/outputs/apk/release/app-release.apk "Pulse-Messenger-${RELEASE_TAG}-Android.apk"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Pulse Messenger ${{ env.RELEASE_TAG }}
          prerelease: true
          generate_release_notes: true
          files: Pulse-Messenger-${{ env.RELEASE_TAG }}-Android.apk

  desktop:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows EXE
            os: windows-latest
            bundles: nsis
          - name: Linux AppImage and DEB
            os: ubuntu-22.04
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || env.RELEASE_TAG }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Build desktop packages
        run: pnpm tauri build --bundles ${{ matrix.bundles }}
      - name: Prepare Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item (Get-ChildItem 'src-tauri/target/release/bundle/nsis/*.exe' | Select-Object -First 1) "Pulse-Messenger-$env:RELEASE_TAG-Windows.exe"
      - name: Prepare Linux packages
        if: runner.os == 'Linux'
        run: |
          cp "$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' -print -quit)" "Pulse-Messenger-${RELEASE_TAG}-Linux.AppImage"
          cp "$(find src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)" "Pulse-Messenger-${RELEASE_TAG}-Linux.deb"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Pulse Messenger ${{ env.RELEASE_TAG }}
          prerelease: true
          generate_release_notes: true
          files: |
            Pulse-Messenger-${{ env.RELEASE_TAG }}-Windows.exe
            Pulse-Messenger-${{ env.RELEASE_TAG }}-Linux.AppImage
            Pulse-Messenger-${{ env.RELEASE_TAG }}-Linux.deb
          fail_on_unmatched_files: false
