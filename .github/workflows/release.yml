name: Release native apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PULSE_APP_URL: ${{ vars.PULSE_APP_URL || 'https://pulse-messenger.vercel.app' }}

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --frozen-lockfile
      - run: pnpm android:sync
        env:
          NODE_ENV: production
      - run: ./gradlew assembleRelease
        working-directory: android
      - run: cp android/app/build/outputs/apk/release/app-release-unsigned.apk Pulse-${GITHUB_REF_NAME}-android-unsigned.apk
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-android
          path: Pulse-*-android-unsigned.apk

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: pulse-windows
          - os: ubuntu-22.04
            artifact: pulse-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - if: runner.os == 'Windows'
        run: pnpm exec tauri build --bundles nsis
      - if: runner.os == 'Linux'
        run: pnpm exec tauri build --bundles appimage,deb
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [android, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - run: |
          find release-assets -type f -maxdepth 2 -print0 | xargs -0 sha256sum > release-assets/SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: release-assets/**
