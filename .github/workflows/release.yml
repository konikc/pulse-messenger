name: Native release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v0.1.0

permissions:
  contents: write

concurrency:
  group: native-release-${{ github.ref }}
  cancel-in-progress: false

env:
  PULSE_APP_URL: https://pulse-messenger-10imd7c7p-shelperapp-7107s-projects.vercel.app

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: pnpm install --frozen-lockfile
      - name: Restore signing key
        env:
          PULSE_KEYSTORE_BASE64: ${{ secrets.PULSE_KEYSTORE_BASE64 }}
        run: echo "$PULSE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/pulse-release.jks"
      - name: Sync Capacitor
        run: pnpm exec cap sync android
      - name: Build signed APK
        working-directory: android
        env:
          PULSE_KEYSTORE_PATH: ${{ runner.temp }}/pulse-release.jks
          PULSE_KEYSTORE_PASSWORD: ${{ secrets.PULSE_KEYSTORE_PASSWORD }}
          PULSE_KEY_ALIAS: ${{ secrets.PULSE_KEY_ALIAS }}
          PULSE_KEY_PASSWORD: ${{ secrets.PULSE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease
      - name: Name APK
        run: cp android/app/build/outputs/apk/release/app-release.apk Pulse-Android-v0.1.0.apk
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-android
          path: Pulse-Android-v0.1.0.apk
          if-no-files-found: error

  desktop:
    name: Desktop (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            bundles: nsis
          - name: Linux
            os: ubuntu-22.04
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - name: Build desktop bundles
        run: pnpm exec tauri build --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  publish:
    name: Publish GitHub pre-release
    needs: [android, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --title "Pulse $RELEASE_TAG" --notes-file RELEASE_NOTES.md --prerelease
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
