name: Native release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v0.1.4

permissions:
  contents: write

concurrency:
  group: native-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  PULSE_APP_URL: https://pulse-messenger-eight.vercel.app
  PNPM_VERSION: 10.24.0

jobs:
  validate-server:
    name: Validate production server
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify Pulse deployment
        run: curl --fail --silent --show-error --location --retry 3 --retry-all-errors "$PULSE_APP_URL" --output /dev/null

  android:
    name: Android APK
    needs: validate-server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: pnpm install --frozen-lockfile
      - name: Resolve release version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: echo "RELEASE_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"
      - name: Validate release version
        shell: bash
        run: |
          test "$(node -p "require('./package.json').version")" = "$RELEASE_VERSION"
          test "$(node -p "require('./src-tauri/tauri.conf.json').version")" = "$RELEASE_VERSION"
      - name: Restore signing key
        env:
          PULSE_KEYSTORE_BASE64: ${{ secrets.PULSE_KEYSTORE_BASE64 }}
        run: echo "$PULSE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/pulse-release.jks"
      - name: Sync Capacitor
        run: pnpm exec cap sync android
      - name: Build signed APK
        working-directory: android
        env:
          PULSE_KEYSTORE_PATH: ${{ runner.temp }}/pulse-release.jks
          PULSE_KEYSTORE_PASSWORD: ${{ secrets.PULSE_KEYSTORE_PASSWORD }}
          PULSE_KEY_ALIAS: ${{ secrets.PULSE_KEY_ALIAS }}
          PULSE_KEY_PASSWORD: ${{ secrets.PULSE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease
      - name: Name APK
        shell: bash
        run: |
          APK_PATH="$(find android/app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print -quit)"
          if [ -z "$APK_PATH" ]; then
            echo "No release APK was produced" >&2
            exit 1
          fi
          cp "$APK_PATH" "Pulse-Android-v${RELEASE_VERSION}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-android
          path: Pulse-Android-v*.apk
          if-no-files-found: error

  desktop:
    name: Desktop (${{ matrix.name }})
    needs: validate-server
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            bundles: nsis
            artifact: pulse-windows
            paths: src-tauri/target/release/bundle/nsis/*.exe
          - name: Linux
            os: ubuntu-22.04
            bundles: appimage,deb
            artifact: pulse-linux
            paths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - name: Resolve release version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: echo "RELEASE_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"
      - name: Validate release version
        shell: bash
        run: |
          test "$(node -p "require('./package.json').version")" = "$RELEASE_VERSION"
          test "$(node -p "require('./src-tauri/tauri.conf.json').version")" = "$RELEASE_VERSION"
      - name: Build desktop bundles
        run: pnpm exec tauri build --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  publish:
    name: Publish GitHub pre-release
    needs: [android, desktop]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Flatten release assets
        shell: bash
        run: |
          shopt -s globstar nullglob
          for file in release-assets/**/*; do
            [ -f "$file" ] || continue
            destination="release-assets/$(basename "$file")"
            if [ "$file" = "$destination" ]; then
              continue
            fi
            if [ -e "$destination" ]; then
              echo "Duplicate release asset: $(basename "$file")" >&2
              exit 1
            fi
            mv "$file" "$destination"
          done
          find release-assets -mindepth 1 -type d -empty -delete
      - name: Verify release assets
        shell: bash
        run: |
          find release-assets -maxdepth 1 -type f -name '*.apk' -print -quit | grep -q .
          find release-assets -maxdepth 1 -type f -name '*.exe' -print -quit | grep -q .
          find release-assets -maxdepth 1 -type f -name '*.AppImage' -print -quit | grep -q .
          find release-assets -maxdepth 1 -type f -name '*.deb' -print -quit | grep -q .
      - name: Generate checksums
        working-directory: release-assets
        shell: bash
        run: |
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -print0 \
            | sort -z \
            | xargs -0 -r sha256sum -- \
            | sed 's#  \./#  #' > SHA256SUMS.txt
          test -s SHA256SUMS.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --target "${{ github.sha }}" --title "Pulse $RELEASE_TAG" --generate-notes --prerelease
          find release-assets -maxdepth 1 -type f -print0 | xargs -0 -r gh release upload "$RELEASE_TAG" --clobber --
