name: Release Pulse

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        default: v0.1.0

permissions:
  contents: write

concurrency:
  group: pulse-release-${{ github.ref }}
  cancel-in-progress: false

env:
  PULSE_APP_URL: https://pulse-messenger.vercel.app

jobs:
  desktop:
    name: Desktop (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            bundles: nsis
          - platform: linux
            os: ubuntu-22.04
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Build desktop package
        run: pnpm exec tauri build --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: pnpm install --frozen-lockfile
      - run: pnpm android:sync
      - name: Build installable APK
        working-directory: android
        run: ./gradlew assembleDebug
      - name: Name APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Pulse-Android-v0.1.0.apk
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-android
          path: Pulse-Android-v0.1.0.apk
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [desktop, android]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Resolve release tag
        id: release
        shell: bash
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Pulse ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          prerelease: true
          files: |
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.apk
